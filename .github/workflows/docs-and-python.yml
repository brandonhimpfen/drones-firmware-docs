name: Docs and Python Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        working-directory: examples/python
        run: |
          python -m pip install pytest
          python -m pytest
      - name: Validate sample manifest
        run: python examples/python/scripts/validate_manifest.py sample-firmware-manifest.json
